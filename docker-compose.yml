version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vibeui_postgres
    restart: always
    environment:
      POSTGRES_USER: vibeui
      POSTGRES_PASSWORD: vibeui_password
      POSTGRES_DB: vibeuidb
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vibeui_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
